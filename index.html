<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catholic Abolition Movement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
                  url('https://images.unsplash.com/photo-1506630391771-a4428d1e6bcd?q=80&w=1167&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 22px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .coming {
      font-size: 18px;
      margin-bottom: 40px;
      opacity: 0.8;
    }

    .email-box {
      display: flex;
      gap: 10px;
    }

    input {
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      width: 250px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      background: #c9a646;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e0bb5c;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <h1>Catholic Abolition Movement</h1>
  <div class="tagline">Justice for the Unborn</div>
  <div class="coming">A movement is forming. Coming soon.</div>

  <div class="email-box">
    <input type="email" placeholder="Enter your email">
    <button>Join</button>
  </div>

  <div class="footer">
    Defending every human life from conception
  </div>

</body>
</html>
